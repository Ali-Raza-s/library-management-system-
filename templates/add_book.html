<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Book | SMART-SHELF</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    {% include 'partials/navbar.html' %}

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-8">

                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <h1 class="h4 text-primary mb-4">Add New Book</h1>

                        <!-- PART 2: Form POSTs to /add_book route in app.py -->
                        <form method="POST" action="{{ url_for('add_book') }}">

                            <div class="mb-3">
                                <label for="title" class="form-label">Title</label>
                                <input type="text" class="form-control" id="title" name="title" required>
                            </div>

                            <div class="mb-3">
                                <label for="author" class="form-label">Author</label>
                                <input type="text" class="form-control" id="author" name="author" required>
                            </div>

                            <div class="mb-3">
                                <label for="isbn" class="form-label">ISBN</label>
                                <input type="text" class="form-control" id="isbn" name="isbn"
                                       placeholder="e.g. 978-111-0001">
                            </div>

                            <div class="mb-3">
                                <label for="description" class="form-label">Description</label>
                                <textarea class="form-control" id="description" name="description" rows="4"
                                          placeholder="Explain what the book teaches, topics covered, and learning outcomes."></textarea>
                            </div>

                            <div class="mb-3">
                                <label for="publication_year" class="form-label">Publication Year</label>
                                <input type="number" class="form-control" id="publication_year" name="publication_year"
                                       min="1900" max="2100" placeholder="e.g. 2021">
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="total_copies" class="form-label">Total Copies</label>
                                    <input type="number" class="form-control" id="total_copies"
                                           name="total_copies" value="1" min="1" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="available_copies" class="form-label">Available Copies</label>
                                    <input type="number" class="form-control" id="available_copies"
                                           name="available_copies" value="1" min="0" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="category_id" class="form-label">Category</label>
                                <select class="form-select" id="category_id" name="category_id" required>
                                    <option value="">-- Select Category --</option>
                                    {% for category in category_list %}
                                    <option value="{{ category.category_id }}">
                                        {{ category.category_name }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>

                            <button type="submit" class="btn btn-primary">Save Book</button>
                            <a href="{{ url_for('books') }}" class="btn btn-outline-secondary ms-2">Cancel</a>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
