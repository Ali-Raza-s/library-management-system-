<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART-SHELF | Digital Library Manager</title>

    <!-- Bootstrap 5 CSS from CDN (no local install needed) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Main container: centers content on the page -->
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-7">

                <!-- Card box for a clean university project look -->
                <div class="card shadow-sm border-0">
                    <div class="card-body p-5 text-center">

                        <!-- Project title -->
                        <h1 class="display-6 fw-bold text-primary mb-3">
                            Smart-Shelf Digital Library Manager
                        </h1>
                        <p class="text-muted mb-4">
                            University Database Project — Flask + MySQL
                        </p>

                        <hr class="my-4">

                        <!-- Database status section -->
                        <h2 class="h5 mb-3">Database Connection Status</h2>

                        <ul class="list-group list-group-flush text-start mb-0">
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                <span>MySQL Status</span>
                                {% if mysql_status == "Connected" %}
                                <span class="badge bg-success rounded-pill">{{ mysql_status }}</span>
                                {% else %}
                                <span class="badge bg-danger rounded-pill">{{ mysql_status }}</span>
                                {% endif %}
                            </li>
                        </ul>

                        <div class="mt-4">
                            <a href="{{ url_for('login') }}" class="btn btn-primary">Go to Login</a>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JavaScript (optional, for interactive components later) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
